name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers and run Newman contract tests
        run: |
          npm run mock:iot < /dev/null > prism-iot.log 2>&1 &
          npm run mock:vision < /dev/null > prism-vision.log 2>&1 &
          npx wait-on http://127.0.0.1:4010/health http://127.0.0.1:4011/health --timeout 30000 || (echo "=== IOT LOG ===" && cat prism-iot.log && echo "=== VISION LOG ===" && cat prism-vision.log && exit 1)
          npm run test:all-reporters

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
